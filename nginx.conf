# Nginx reverse proxy config for Agent One
# Place at: /etc/nginx/sites-available/agent-one
# Then: sudo ln -s /etc/nginx/sites-available/agent-one /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d your-domain.com
# Then: sudo nginx -s reload

server {
    listen 80;
    server_name your-domain.com;

    # Redirect all HTTP to HTTPS (certbot fills this in automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL certs — filled in by certbot automatically
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Open WebUI (chat interface) — served at root
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # allow long SSE streams
        proxy_buffering off;       # critical for streaming
    }

    # FastAPI (direct API access) — served at /api
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
