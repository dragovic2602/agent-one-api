services:
  api:
    build: .
    container_name: agent_one_api
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: agent_one_ui
    environment:
      - OPENAI_API_BASE_URL=http://api:8000/v1
      - OPENAI_API_KEY=${API_KEY}
      - WEBUI_AUTH=false
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "3000:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  open-webui-data:
